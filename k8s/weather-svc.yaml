# TempEdge Weather Service
# Stateless — forecast + current conditions API
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: weather-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: weather-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: weather-svc
    spec:
      containers:
        - name: weather-svc
          image: tempedge-weather-svc:latest
          imagePullPolicy: Never
          env:
            - name: WEATHER_SVC_PORT
              value: "3002"
          envFrom:
            - configMapRef:
                name: tempedge-config
            - secretRef:
                name: weather-api-keys
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: weather-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: weather-svc
spec:
  type: ClusterIP
  selector:
    app: tempedge
    component: weather-svc
  ports:
    - name: http
      port: 3002
      targetPort: 3002
      protocol: TCP
