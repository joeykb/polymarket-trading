# TempEdge Liquidity Service — WebSocket order book streaming
# No VPN needed (read-only public WebSocket, no trading)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquidity-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: liquidity-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: liquidity-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: liquidity-svc
    spec:
      # Wait for data-svc to be ready (session discovery + config)
      initContainers:
        - name: wait-for-data-svc
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://data-svc:3005/health > /dev/null 2>&1; do echo "Waiting for data-svc..."; sleep 2; done']
      containers:
        - name: liquidity-svc
          image: tempedge-liquidity-svc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: LIQUIDITY_PORT
              value: "3001"
            - name: DATA_SVC_URL
              value: "http://data-svc:3005"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: liquidity-svc
  namespace: tempedge
spec:
  type: ClusterIP
  selector:
    app: tempedge
    component: liquidity-svc
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
