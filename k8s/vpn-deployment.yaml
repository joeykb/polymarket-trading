# TempEdge VPN Gateway
# Standalone Gluetun deployment — separated from the app so that
# app redeploys don't restart the VPN tunnel.
#
# The app containers connect through this via HTTP proxy (port 8888)
# or Shadowsocks (port 8388).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempedge-vpn
  namespace: tempedge
  labels:
    app: tempedge-vpn
spec:
  replicas: 1
  strategy:
    type: Recreate   # VPN needs exclusive /dev/net/tun
  selector:
    matchLabels:
      app: tempedge-vpn
  template:
    metadata:
      labels:
        app: tempedge-vpn
    spec:
      containers:
        - name: vpn
          image: qmcgaw/gluetun:latest
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "custom"
            - name: VPN_TYPE
              value: "openvpn"
            - name: OPENVPN_CUSTOM_CONFIG
              value: "/gluetun/custom/nordvpn.ovpn"
            # Enable the built-in HTTP proxy so app containers can route through
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LOG
              value: "off"
            # Healthcheck target
            - name: HEALTH_TARGET_ADDRESS
              value: "gamma-api.polymarket.com:443"
          envFrom:
            - secretRef:
                name: nordvpn-credentials
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
            - name: ovpn-config
              mountPath: /gluetun/custom
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - name: proxy
              containerPort: 8888
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "wget -qO- --timeout=5 https://gamma-api.polymarket.com > /dev/null 2>&1"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "wget -qO- --timeout=5 https://gamma-api.polymarket.com > /dev/null 2>&1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: ovpn-config
          configMap:
            name: nordvpn-ovpn

---
# ClusterIP service so app containers can reach the VPN proxy
apiVersion: v1
kind: Service
metadata:
  name: tempedge-vpn
  namespace: tempedge
  labels:
    app: tempedge-vpn
spec:
  type: ClusterIP
  selector:
    app: tempedge-vpn
  ports:
    - name: proxy
      port: 8888
      targetPort: 8888
      protocol: TCP
