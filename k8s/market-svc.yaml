# TempEdge Market Service
# Stateless — Polymarket Gamma API discovery + range selection
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: market-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: market-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: market-svc
    spec:
      containers:
        - name: market-svc
          image: tempedge-market-svc:latest
          imagePullPolicy: Never
          env:
            - name: MARKET_SVC_PORT
              value: "3003"
          envFrom:
            - configMapRef:
                name: tempedge-config
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          ports:
            - name: http
              containerPort: 3003
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: market-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: market-svc
spec:
  type: ClusterIP
  selector:
    app: tempedge
    component: market-svc
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
