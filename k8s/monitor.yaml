# TempEdge Monitor — Orchestrator
# No exposed port — pure timer loop that calls other services
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: tempedge
  labels:
    app: tempedge
    component: monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: monitor
  template:
    metadata:
      labels:
        app: tempedge
        component: monitor
    spec:
      # Wait for ALL services to be ready before starting the orchestrator
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for data-svc..."
              until wget -qO- http://data-svc:3005/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for weather-svc..."
              until wget -qO- http://weather-svc:3002/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for market-svc..."
              until wget -qO- http://market-svc:3003/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for trading-svc..."
              until wget -qO- http://trading-svc:3004/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for liquidity-svc..."
              until wget -qO- http://liquidity-svc:3001/health > /dev/null 2>&1; do sleep 2; done
              echo "All services ready — starting monitor."
      containers:
        - name: monitor
          image: tempedge-monitor:latest
          imagePullPolicy: Never
          env:
            - name: WEATHER_SVC_URL
              value: "http://weather-svc:3002"
            - name: MARKET_SVC_URL
              value: "http://market-svc:3003"
            - name: TRADING_SVC_URL
              value: "http://trading-svc:3004"
            - name: DATA_SVC_URL
              value: "http://data-svc:3005"
            - name: LIQUIDITY_SVC_URL
              value: "http://liquidity-svc:3001"
          envFrom:
            - configMapRef:
                name: tempedge-config
            - secretRef:
                name: tempedge-service-auth
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
# No Service needed — monitor doesn't expose any port
