# TempEdge Trading Service
# The ONLY service that routes through the VPN gateway.
# Handles all buy/sell/redeem CLOB operations.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: trading-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: trading-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: trading-svc
    spec:
      containers:
        - name: trading-svc
          image: tempedge-trading-svc:latest
          imagePullPolicy: Never
          env:
            - name: TRADING_SVC_PORT
              value: "3004"
            - name: DATA_SVC_URL
              value: "http://data-svc:3005"
            # Route CLOB API calls through the VPN gateway
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: HTTP_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: HTTPS_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            # Don't proxy internal service traffic
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local,data-svc,weather-svc,market-svc"
          envFrom:
            - configMapRef:
                name: tempedge-config
            - secretRef:
                name: polymarket-trading
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - name: http
              containerPort: 3004
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: trading-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: trading-svc
spec:
  type: ClusterIP
  selector:
    app: tempedge
    component: trading-svc
  ports:
    - name: http
      port: 3004
      targetPort: 3004
      protocol: TCP
