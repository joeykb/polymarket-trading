# TempEdge Dashboard — Serves UI, proxies to data-svc/trading-svc/liquidity-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: dashboard-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: dashboard-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: dashboard-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # Wait for upstream services to be ready
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for data-svc..."
              until wget -qO- http://data-svc:3005/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for trading-svc..."
              until wget -qO- http://trading-svc:3004/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for liquidity-svc..."
              until wget -qO- http://liquidity-svc:3001/health > /dev/null 2>&1; do sleep 2; done
              echo "All dependencies ready."
      containers:
        - name: dashboard-svc
          image: tempedge-dashboard-svc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DASHBOARD_PORT
              value: "3000"
            - name: WEATHER_SVC_URL
              value: "http://weather-svc:3002"
            - name: MARKET_SVC_URL
              value: "http://market-svc:3003"
            - name: TRADING_SVC_URL
              value: "http://trading-svc:3004"
            - name: DATA_SVC_URL
              value: "http://data-svc:3005"
            - name: LIQUIDITY_SVC_URL
              value: "http://liquidity-svc:3001"
          envFrom:
            - secretRef:
                name: tempedge-service-auth
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/dates
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/dates
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: tempedge
spec:
  type: NodePort
  selector:
    app: tempedge
    component: dashboard-svc
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30301  # Accessible at http://localhost:30301
      protocol: TCP
