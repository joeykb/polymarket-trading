# TempEdge Dashboard — Serves UI, proxies to data-svc/trading-svc/liquidity-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-svc
  namespace: tempedge
  labels:
    app: tempedge
    component: dashboard-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: dashboard-svc
  template:
    metadata:
      labels:
        app: tempedge
        component: dashboard-svc
    spec:
      containers:
        - name: dashboard-svc
          image: tempedge-dashboard-svc:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DASHBOARD_PORT
              value: "3000"
            - name: WEATHER_SVC_URL
              value: "http://weather-svc:3002"
            - name: MARKET_SVC_URL
              value: "http://market-svc:3003"
            - name: TRADING_SVC_URL
              value: "http://trading-svc:3004"
            - name: DATA_SVC_URL
              value: "http://data-svc:3005"
            - name: LIQUIDITY_SVC_URL
              value: "http://liquidity-svc:3001"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/dates
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/dates
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc
  namespace: tempedge
spec:
  type: NodePort
  selector:
    app: tempedge
    component: dashboard-svc
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30301  # Accessible at http://localhost:30301
      protocol: TCP
