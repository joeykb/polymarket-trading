# TempEdge Service
# Exposes the dashboard on a NodePort so it's accessible from the host
apiVersion: v1
kind: Service
metadata:
  name: tempedge-dashboard
  namespace: tempedge
  labels:
    app: tempedge
    component: dashboard
spec:
  type: NodePort
  selector:
    app: tempedge
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30301  # Accessible at http://localhost:30301
      protocol: TCP
