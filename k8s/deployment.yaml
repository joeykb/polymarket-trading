# TempEdge Application Deployment
# Monitor + Dashboard + Liquidity containers
# Routes outbound traffic through the separate VPN gateway via HTTP proxy
# Requires Node 24+ with NODE_USE_ENV_PROXY=1 for native fetch() proxy support
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempedge
  namespace: tempedge
  labels:
    app: tempedge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
  template:
    metadata:
      labels:
        app: tempedge
    spec:
      containers:
        # ── Monitor Container ─────────────────────────────
        # Runs the periodic monitoring loop
        - name: monitor
          image: tempedge:latest
          imagePullPolicy: Never
          command: ["node", "src/monitor.js"]
          env:
            # Enable Node 24 native proxy support for fetch()
            - name: NODE_USE_ENV_PROXY
              value: "1"
            # Route outbound API calls through the VPN gateway
            - name: HTTP_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: HTTPS_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            # Don't proxy local traffic (dashboard, liquidity, localhost)
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local"
          envFrom:
            - configMapRef:
                name: tempedge-config
            - secretRef:
                name: polymarket-trading
          volumeMounts:
            - name: output
              mountPath: /app/output
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        # ── Dashboard Container ───────────────────────────
        # Serves the web dashboard + admin config page on port 3000
        - name: dashboard
          image: tempedge:latest
          imagePullPolicy: Never
          command: ["node", "src/dashboard/server.js"]
          env:
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: HTTP_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: HTTPS_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local"
          envFrom:
            - configMapRef:
                name: tempedge-config
            - secretRef:
                name: polymarket-trading
          volumeMounts:
            - name: output
              mountPath: /app/output
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

        # ── Liquidity Container ──────────────────────────
        # Dedicated WebSocket microservice for real-time order book streaming
        - name: liquidity
          image: tempedge:latest
          imagePullPolicy: Never
          command: ["node", "src/liquidity.js"]
          env:
            - name: NODE_USE_ENV_PROXY
              value: "1"
            - name: HTTP_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: HTTPS_PROXY
              value: "http://tempedge-vpn.tempedge.svc.cluster.local:8888"
            - name: NO_PROXY
              value: "localhost,127.0.0.1,.svc.cluster.local"
          envFrom:
            - configMapRef:
                name: tempedge-config
          volumeMounts:
            - name: output
              mountPath: /app/output
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5

      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: tempedge-output
