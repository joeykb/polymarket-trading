# Weather API Credentials
# ─────────────────────────────────────────────────────────────
# Copy this to weather-secret.yaml, fill in real values,
# then apply: kubectl apply -f k8s/secrets/weather-secret.yaml
#
# Get a Weather Company API key from:
# https://www.wunderground.com/member/api-keys
#
# NEVER commit the filled-in version to git!
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: weather-api-keys
  namespace: tempedge
  labels:
    app: tempedge
type: Opaque
stringData:
  WC_API_KEY: ""
