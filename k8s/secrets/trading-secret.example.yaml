# Polymarket Trading Credentials
# ─────────────────────────────────────────────────────────────
# Copy this to trading-secret.yaml, fill in real values,
# then apply: kubectl apply -f k8s/secrets/trading-secret.yaml
#
# NEVER commit the filled-in version to git!
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: polymarket-trading
  namespace: tempedge
  labels:
    app: tempedge
type: Opaque
stringData:
  # Your Polymarket wallet private key (hex with 0x prefix)
  POLYMARKET_PRIVATE_KEY: ""
  # Builder/operator credentials (from Polymarket developer portal)
  POLYMARKET_BUILDER_ADDRESS: ""
  POLYMARKET_BUILDER_API_KEY: ""
  POLYMARKET_BUILDER_SECRET: ""
  POLYMARKET_BUILDER_PASSPHRASE: ""
  # Safety gate: disabled | dry-run | live
  TRADING_MODE: "disabled"
