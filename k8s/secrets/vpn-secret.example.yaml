# NordVPN Credentials for Gluetun VPN Sidecar
# ─────────────────────────────────────────────────────────────
# Copy this to vpn-secret.yaml, fill in real values,
# then apply: kubectl apply -f k8s/secrets/vpn-secret.yaml
#
# These are NordVPN "service credentials" (not login credentials).
# Get them from: https://my.nordaccount.com/dashboard/nordvpn/manual-configuration/
#
# NEVER commit the filled-in version to git!
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: nordvpn-credentials
  namespace: tempedge
  labels:
    app: tempedge
type: Opaque
stringData:
  OPENVPN_USER: ""
  OPENVPN_PASSWORD: ""
