apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-svc-green
  namespace: tempedge
  labels:
    app: tempedge
    component: dashboard-svc-green
    version: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: dashboard-svc-green
      version: green
  template:
    metadata:
      labels:
        app: tempedge
        component: dashboard-svc-green
        version: green
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for data-svc-green..."
              until wget -qO- http://data-svc-green:3005/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for trading-svc-green..."
              until wget -qO- http://trading-svc-green:3004/health > /dev/null 2>&1; do sleep 2; done
              echo "Waiting for liquidity-svc-green..."
              until wget -qO- http://liquidity-svc-green:3001/health > /dev/null 2>&1; do sleep 2; done
              echo "All green dependencies ready."
      containers:
        - name: dashboard-svc-green
          image: tempedge-dashboard-svc:green
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DASHBOARD_PORT
              value: "3000"
            - name: DATA_SVC_URL
              value: "http://data-svc-green:3005"
            - name: TRADING_SVC_URL
              value: "http://trading-svc-green:3004"
            - name: LIQUIDITY_SVC_URL
              value: "http://liquidity-svc-green:3001"
            - name: MARKET_SVC_URL
              value: "http://market-svc-green:3003"
            - name: WEATHER_SVC_URL
              value: "http://weather-svc-green:3002"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-svc-green
  namespace: tempedge
  labels:
    app: tempedge
    component: dashboard-svc-green
    version: green
spec:
  type: NodePort
  selector:
    app: tempedge
    component: dashboard-svc-green
    version: green
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30302
      protocol: TCP
