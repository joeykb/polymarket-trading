apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-svc-green
  namespace: tempedge
  labels:
    app: tempedge
    component: market-svc-green
    version: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempedge
      component: market-svc-green
      version: green
  template:
    metadata:
      labels:
        app: tempedge
        component: market-svc-green
        version: green
    spec:
      containers:
        - name: market-svc-green
          image: tempedge-market-svc:green
          imagePullPolicy: Never
          ports:
            - containerPort: 3003
          env:
            - name: DATA_SVC_URL
              value: "http://data-svc-green:3005"
            - name: MARKET_SVC_PORT
              value: "3003"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: market-svc-green
  namespace: tempedge
  labels:
    app: tempedge
    component: market-svc-green
    version: green
spec:
  type: ClusterIP
  selector:
    app: tempedge
    component: market-svc-green
    version: green
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
