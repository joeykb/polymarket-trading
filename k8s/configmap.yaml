# TempEdge ConfigMap
# Only values that MUST be locked per-environment go here.
# Everything else is managed at runtime via /admin and persisted
# to config-overrides.json on the PVC.
#
# Priority: ENV (this file + secrets) > Admin Overrides > Defaults
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempedge-config
  namespace: tempedge
  labels:
    app: tempedge
data:
  # ── Infrastructure ──────────────────────────────────────────
  DASHBOARD_PORT: "3000"

  # Everything else (weather, polymarket, trading risk, monitoring
  # thresholds, phase logic) uses defaults from src/config.js and
  # can be edited live at /admin.
